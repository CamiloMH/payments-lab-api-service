services:
  mariadb:
    image: mariadb:11
    container_name: payments-lab-api-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
      MARIADB_DATABASE: ${DB_NAME:-payments_lab}
      MARIADB_USER: ${DB_USER:-payments}
      MARIADB_PASSWORD: ${DB_PASSWORD:-payments_pass}
    # 3309 en el host para no chocar con otros proyectos ni instalaciones locales (3306).
    ports:
      - "${DB_PORT:-3309}:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mariadb_data:
